<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="t d"><title id="t">AUREON LUX route architecture</title><desc id="d">Page architecture diagram showing homepage, projects, research, source registry and archive layers.</desc>
